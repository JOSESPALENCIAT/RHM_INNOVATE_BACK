# Deploy RHM Innovate Backend (.NET 10) to Azure App Service
#
# Secrets requeridos en GitHub → Settings → Secrets and variables → Actions:
#   AZURE_WEBAPP_PUBLISH_PROFILE  → Descargarlo desde Azure Portal:
#     App Service "RHM-backend-annar" → Overview → Get publish profile
#
# Credenciales sensibles (connection strings, JWT key, etc.) se configuran
# directamente en Azure Portal → App Service → Settings → Configuration → Application settings,
# NO en este archivo:
#   ConnectionStrings__AzureSql     → connection string SQL
#   MongoDB__ConnectionString       → connection string MongoDB
#   MongoDB__DatabaseName           → rhm_innovate
#   Jwt__Key                        → clave JWT
#   Jwt__Issuer                     → RHMInnovate
#   Jwt__Audience                   → RHMInnovateApp
#   Jwt__ExpiryMinutes              → 60
#   SuperAdmin__Email               → superadmin@rhminnovate.com
#   SuperAdmin__Password            → contraseña superadmin
#   SuperAdmin__FirstName           → Super
#   SuperAdmin__LastName            → Admin
#   N8n__WebhookUrl                 → URL del webhook n8n (opcional)
#   App__FrontendUrl                → https://[tu-front].azurestaticapps.net

name: Deploy Backend to Azure App Service

on:
  push:
    branches: ["main"]
  workflow_dispatch:  # permite ejecución manual desde GitHub UI

env:
  AZURE_WEBAPP_NAME: RHM-backend-annar
  DOTNET_VERSION: '10.0.x'
  PROJECT_PATH: './src/RHM.API/RHM.API.csproj'
  PUBLISH_DIR: './publish'
  # win-x64 requiere App Service configurado en 64-bit (Azure Portal → Configuration → General settings → Platform: 64 Bit).
  RUNTIME: 'win-x64'

jobs:
  build-and-deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore ${{ env.PROJECT_PATH }}

      - name: Build
        run: dotnet build ${{ env.PROJECT_PATH }} --configuration Release --no-restore

      - name: Publish (self-contained)
        run: |
          dotnet publish ${{ env.PROJECT_PATH }} \
            --configuration Release \
            --runtime ${{ env.RUNTIME }} \
            --self-contained true \
            --output ${{ env.PUBLISH_DIR }} \
            -p:PublishSingleFile=false

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ${{ env.PUBLISH_DIR }}
